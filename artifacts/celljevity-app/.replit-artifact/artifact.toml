kind = "web"
previewPath = "/"
title = "Celljevity Longevity OS"
version = "1.0.0"
id = "artifacts/celljevity-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20286
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/celljevity-app run dev"

[services.env]
PORT = "20286"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/celljevity-app", "run", "build"]
publicDir = "artifacts/celljevity-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
